<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Code · {{ book.title }}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FFF8F2;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:24px;padding:40px 36px;max-width:400px;width:100%;text-align:center;border:1.5px solid #f0e0d8;box-shadow:0 8px 32px rgba(255,112,67,.08)}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.book-name{font-size:14px;color:#888;margin-bottom:28px;line-height:1.4}
.digits-label{font-size:13px;font-weight:600;color:#555;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.digits{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.digit-box{width:64px;height:72px;border:2.5px solid #ddd;border-radius:14px;font-size:32px;font-weight:700;text-align:center;color:#E65100;background:#FFFAF7;outline:none;transition:border-color .15s,box-shadow .15s;-moz-appearance:textfield}
.digit-box::-webkit-outer-spin-button,.digit-box::-webkit-inner-spin-button{-webkit-appearance:none}
.digit-box:focus{border-color:#FF7043;box-shadow:0 0 0 3px rgba(255,112,67,.15)}
.digit-box.filled{border-color:#FF7043;background:#FFF3EE}
{% if error %}.digit-box{border-color:#E53935;animation:shake .3s ease}{% endif %}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.error-msg{background:#FFEBEE;color:#C62828;font-size:13px;padding:10px 16px;border-radius:10px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.btn-submit{width:100%;background:#FF7043;color:#fff;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;margin-bottom:16px}
.btn-submit:hover{background:#E64A19}
.btn-submit:disabled{background:#ddd;cursor:not-allowed}
.hint{font-size:12px;color:#aaa;line-height:1.5;margin-bottom:20px}
.hint strong{color:#E65100}
.back{font-size:13px;color:#aaa;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.back:hover{color:#FF7043}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔑</div>
  <h1>Enter Your Book Code</h1>
  <div class="book-name">To access <strong>{{ book.title }}</strong></div>

  {% if error %}
  <div class="error-msg">❌ {{ error }}</div>
  {% endif %}

  <form method="POST" id="codeForm">
    <div class="digits-label">4-Digit Code</div>
    <div class="digits">
      <input class="digit-box" type="number" name="d1" id="d1" min="0" max="9" maxlength="1" placeholder="·" autocomplete="off" required>
      <input class="digit-box" type="number" name="d2" id="d2" min="0" max="9" maxlength="1" placeholder="·" autocomplete="off" required>
      <input class="digit-box" type="number" name="d3" id="d3" min="0" max="9" maxlength="1" placeholder="·" autocomplete="off" required>
      <input class="digit-box" type="number" name="d4" id="d4" min="0" max="9" maxlength="1" placeholder="·" autocomplete="off" required>
    </div>

    <div class="hint">
      💡 Find your code inside the front cover of<br><strong>{{ book.title }}</strong>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn" disabled>🔓 Unlock Pronunciation Guide</button>
  </form>

  <a href="/" class="back">← Back to all books</a>
</div>

<script>
const boxes = [d1, d2, d3, d4];
const btn = document.getElementById("submitBtn");

function updateBtn() {
  const filled = boxes.every(b => b.value.length === 1 && b.value >= "0" && b.value <= "9");
  btn.disabled = !filled;
  boxes.forEach(b => b.classList.toggle("filled", b.value.length === 1));
}

boxes.forEach((box, i) => {
  box.addEventListener("input", function() {
    // Keep only last character entered
    if (this.value.length > 1) this.value = this.value.slice(-1);
    if (this.value.length === 1 && i < 3) boxes[i + 1].focus();
    updateBtn();
  });
  box.addEventListener("keydown", function(e) {
    if (e.key === "Backspace" && !this.value && i > 0) {
      boxes[i - 1].focus();
      boxes[i - 1].value = "";
      updateBtn();
    }
    if (e.key === "ArrowLeft" && i > 0) boxes[i - 1].focus();
    if (e.key === "ArrowRight" && i < 3) boxes[i + 1].focus();
  });
  box.addEventListener("paste", function(e) {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "");
    text.split("").slice(0, 4).forEach((ch, j) => {
      if (boxes[j]) boxes[j].value = ch;
    });
    const last = Math.min(text.length, 3);
    boxes[last].focus();
    updateBtn();
  });
});

// Auto-focus first box
boxes[0].focus();
</script>
</body>
</html>
