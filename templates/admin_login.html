<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Biliteracy Bridge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: #1b3a5c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .brand {
    font-size: 0.7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #c8893a;
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: #1b3a5c;
    margin-bottom: 32px;
  }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: border .2s;
  }
  input[type="password"]:focus { border-color: #2a7f8f; }
  .error {
    background: #fff0f0;
    color: #c0392b;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  button {
    width: 100%;
    margin-top: 20px;
    background: #1b3a5c;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #2a7f8f; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Biliteracy Bridge</div>
  <h1>Admin Login</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus placeholder="Enter your admin password">
    <button type="submit">Sign In →</button>
  </form>
</div>
</body>
</html>
