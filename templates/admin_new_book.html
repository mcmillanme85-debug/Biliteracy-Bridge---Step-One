<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Book · Biliteracy Bridge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:20px;padding:36px;max-width:480px;width:100%}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.logo-row img{height:36px}
.logo-row span{font-size:15px;font-weight:700;color:#F9C12E}
h1{font-size:20px;font-weight:800;margin-bottom:6px}
p{font-size:14px;color:#888;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field input[type=text]{width:100%;padding:11px 14px;border:1.5px solid #333;border-radius:10px;background:#111;color:#fff;font-size:14px;outline:none;transition:border-color .15s}
.field input[type=text]:focus{border-color:#F9C12E}
.field .hint{font-size:12px;color:#555;margin-top:4px}
.check-row{display:flex;align-items:center;gap:8px;font-size:14px;color:#aaa;padding:4px 0}
.check-row input{width:16px;height:16px;accent-color:#F9C12E;cursor:pointer}
.error{background:rgba(239,83,80,.15);color:#EF9A9A;border:1px solid rgba(239,83,80,.3);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-save{background:#F9C12E;color:#000;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;flex:1}
.btn-save:hover{background:#FFD54F}
.btn-cancel{background:transparent;color:#aaa;border:1px solid #444;padding:12px 20px;border-radius:10px;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.btn-cancel:hover{border-color:#F9C12E;color:#F9C12E}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <img src="/logo.png" alt="BB" onerror="this.style.display='none'">
    <span>Biliteracy Bridge · Admin</span>
  </div>
  <h1>Create New Book</h1>
  <p>Set up a new pronunciation guide. You can upload the PDF and add words after creating it.</p>

  {% if error %}<div class="error">❌ {{ error }}</div>{% endif %}

  <form method="POST">
    <div class="field">
      <label>Book Title</label>
      <input type="text" name="title" placeholder="e.g. My First Bilingual Cognates – Step One" required autofocus>
    </div>
    <div class="field">
      <label>Book ID (URL slug)</label>
      <input type="text" name="book_id" placeholder="e.g. step-one-cognates" required
             pattern="[a-z0-9\-]+" title="Lowercase letters, numbers, and hyphens only">
      <div class="hint">Lowercase letters, numbers and hyphens only. Used in the URL.</div>
    </div>
    <div class="field">
      <div class="check-row">
        <input type="checkbox" name="free" id="free">
        <label for="free">Free access (no code required)</label>
      </div>
    </div>
    <div class="btn-row">
      <a href="/admin" class="btn-cancel">Cancel</a>
      <button type="submit" class="btn-save">Create Book →</button>
    </div>
  </form>
</div>
</body>
</html>
