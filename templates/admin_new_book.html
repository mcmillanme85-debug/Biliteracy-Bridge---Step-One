<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Book — Biliteracy Bridge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: #f7f4ee; }
  header {
    background: #1b3a5c; color: #fff;
    padding: 16px 32px; border-bottom: 4px solid #c8893a;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-size: 0.7rem; letter-spacing: .12em; text-transform: uppercase; color: #c8893a; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
  .btn-back { color: #aac4d8; text-decoration: none; font-size: 0.85rem; }
  .btn-back:hover { color: #fff; }
  .container { max-width: 560px; margin: 48px auto; padding: 0 20px; }
  .card {
    background: #fff; border-radius: 14px;
    border: 1px solid #ddd8ce; padding: 36px;
    box-shadow: 0 4px 16px rgba(0,0,0,.06);
  }
  .card h2 { font-family: 'Playfair Display', serif; color: #1b3a5c; margin-bottom: 24px; font-size: 1.3rem; }
  .field { margin-bottom: 22px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
  .hint { font-size: 0.78rem; color: #999; margin-top: 4px; }
  input[type="text"] {
    width: 100%; padding: 11px 14px;
    border: 2px solid #ddd8ce; border-radius: 8px;
    font-family: inherit; font-size: 0.95rem; outline: none;
    transition: border .2s;
  }
  input[type="text"]:focus { border-color: #2a7f8f; }
  .error {
    background: #fff0f0; color: #c0392b;
    border: 1px solid #f5c6c6; border-radius: 8px;
    padding: 10px 14px; font-size: 0.9rem; margin-bottom: 20px;
  }
  .submit-btn {
    background: #c8893a; color: #fff; border: none; border-radius: 8px;
    padding: 12px 28px; font-family: inherit; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .submit-btn:hover { opacity: .85; }
</style>
</head>
<body>
<header>
  <div>
    <div class="brand">Biliteracy Bridge · Admin</div>
    <h1>Add New Book</h1>
  </div>
  <a href="/admin" class="btn-back">← Back to Dashboard</a>
</header>

<div class="container">
  <div class="card">
    <h2>New Book Details</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field">
        <label for="title">Book Title (as parents will see it)</label>
        <input type="text" id="title" name="title" placeholder="e.g. My First Bilingual Cognates - Step One" required>
      </div>
      <div class="field">
        <label for="book_id">URL ID (short, lowercase, no spaces)</label>
        <input type="text" id="book_id" name="book_id" placeholder="e.g. cognates-step-one" required>
        <div class="hint">This becomes the link: /book/cognates-step-one — letters, numbers, and hyphens only.</div>
      </div>
      <button type="submit" class="submit-btn">Create Book →</button>
    </form>
  </div>
</div>

<script>
document.getElementById("title").addEventListener("input", function() {
  const id = this.value.toLowerCase()
    .replace(/[^a-z0-9\s\-]/g, "")
    .trim().replace(/\s+/g, "-");
  document.getElementById("book_id").value = id;
});
</script>
</body>
</html>
