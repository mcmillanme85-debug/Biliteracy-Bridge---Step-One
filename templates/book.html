<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>{{ book.title }} · Biliteracy Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0d2680; --navy-deep: #081a5e; --navy-mid: #1a3da8;
      --gold: #f7c325; --gold-dark: #d4a00f;
      --white: #ffffff; --muted: rgba(255,255,255,0.55);
      --border: rgba(255,255,255,0.14); --card-bg: rgba(255,255,255,0.07);
      --font: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 60%, var(--navy-mid) 100%);
      color: var(--white); display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      background: rgba(8,26,94,0.8); backdrop-filter: blur(12px);
      flex-shrink: 0; z-index: 100;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; background: rgba(255,255,255,0.1);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--white); text-decoration: none; font-size: 1rem;
      flex-shrink: 0; transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }
    .header-title { flex: 1; min-width: 0; }
    .header-title .book-name {
      font-size: 0.9rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-title .page-info { font-size: 0.7rem; color: var(--muted); }
    .parrot-icon { font-size: 1.4rem; flex-shrink: 0; }

    /* ── Main layout: desktop two-col, mobile single-col ── */
    .app-layout {
      flex: 1; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* Desktop */
    @media (min-width: 700px) {
      .app-layout { flex-direction: row; }
      .page-panel {
        flex: 1; display: flex; flex-direction: column;
        border-right: 1px solid var(--border);
      }
      .word-panel {
        width: 360px; display: flex; flex-direction: column;
        overflow: hidden;
      }
      .page-canvas { flex: 1; overflow: auto; }
    }

    /* Mobile */
    @media (max-width: 699px) {
      .app-layout { overflow-y: auto; }
      .page-panel { flex-shrink: 0; }
      .page-canvas { max-height: 55vw; }
      .word-panel { flex-shrink: 0; }
    }

    /* ── Page panel ── */
    .page-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; border-bottom: 1px solid var(--border);
      background: rgba(8,26,94,0.4); flex-shrink: 0; gap: 0.5rem;
    }
    .nav-btn {
      display: flex; align-items: center; justify-content: center;
      min-width: 90px; padding: 0.65rem 1rem;
      background: rgba(255,255,255,0.1); border: 1px solid var(--border);
      border-radius: 10px; font-family: var(--font); font-size: 0.85rem;
      font-weight: 600; cursor: pointer; color: var(--white);
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
    .nav-btn:active:not(:disabled) { background: rgba(255,255,255,0.25); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .page-counter { font-size: 0.85rem; font-weight: 600; color: var(--muted);
      white-space: nowrap; }
    .page-canvas {
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3); padding: 1rem;
      overflow: hidden;
    }
    .page-canvas img {
      max-width: 100%; max-height: 100%; object-fit: contain;
      border-radius: 8px; box-shadow: 0 6px 30px rgba(0,0,0,0.4);
    }
    .no-image {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 3rem 1rem; color: var(--muted);
      text-align: center; gap: 0.5rem;
    }
    .no-image span { font-size: 3rem; }
    .no-image p { font-size: 0.85rem; line-height: 1.6; }

    /* ── Word panel ── */
    .word-panel-header {
      padding: 0.8rem 1rem 0.6rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,26,94,0.4); flex-shrink: 0;
    }
    .word-panel-header h3 {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
    }

    /* Current word showcase */
    .word-showcase {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1rem; border-bottom: 1px solid var(--border);
      background: rgba(247,195,37,0.05); flex-shrink: 0; gap: 0.8rem;
    }
    .showcase-words { flex: 1; min-width: 0; }
    .word-es {
      font-size: 1.6rem; font-weight: 800; color: var(--gold);
      line-height: 1.2; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .word-divider { font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--muted); margin: 0.15rem 0; }
    .word-en {
      font-size: 1.15rem; font-weight: 500; color: #7dd3fc;
      line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-play-big {
      width: 56px; height: 56px; flex-shrink: 0;
      background: var(--gold); color: var(--navy-deep);
      border: none; border-radius: 50%;
      font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-play-big:hover { background: #ffd044; transform: scale(1.05); }
    .btn-play-big:active { transform: scale(0.96); }
    .btn-play-big.loading { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Playback controls */
    .controls {
      display: flex; gap: 0.5rem; padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ctrl-btn {
      flex: 1; padding: 0.6rem 0.5rem;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; color: var(--white);
      background: rgba(255,255,255,0.07);
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.13); }
    .ctrl-btn:active { background: rgba(255,255,255,0.2); }
    .ctrl-btn.stop { color: #fca5a5; border-color: rgba(252,165,165,0.3); }

    /* Teacher note */
    .teacher-note {
      margin: 0; padding: 0.7rem 1rem;
      background: rgba(125,211,252,0.07); border-bottom: 1px solid var(--border);
      display: none; flex-shrink: 0;
    }
    .teacher-note.visible { display: block; }
    .teacher-note-label {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #7dd3fc; margin-bottom: 0.3rem;
    }
    .teacher-note-text { font-size: 0.83rem; color: rgba(255,255,255,0.8); line-height: 1.5; }

    /* Word list */
    .word-list { overflow-y: auto; flex: 1; padding: 0.3rem 0; }
    .word-item {
      display: flex; align-items: center; padding: 0.75rem 1rem;
      cursor: pointer; border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s; gap: 0.6rem;
      -webkit-tap-highlight-color: transparent;
      min-height: 52px; /* big enough touch target */
    }
    .word-item:hover { background: rgba(255,255,255,0.06); }
    .word-item:active { background: rgba(255,255,255,0.1); }
    .word-item.active {
      background: rgba(247,195,37,0.1); border-left-color: var(--gold);
    }
    .wi-es { font-weight: 700; font-size: 0.95rem; color: var(--gold); min-width: 90px; }
    .wi-sep { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
    .wi-en { font-size: 0.9rem; color: #7dd3fc; flex: 1; }
    .wi-play {
      font-size: 1rem; opacity: 0; transition: opacity 0.12s;
      padding: 0.3rem; flex-shrink: 0;
    }
    .word-item:hover .wi-play, .word-item.active .wi-play { opacity: 1; }
    @media (max-width: 699px) { .wi-play { opacity: 0.5; } }

    .empty-words {
      padding: 2rem 1rem; text-align: center; color: var(--muted);
    }
    .empty-words p { font-size: 0.85rem; line-height: 1.7; }
    .empty-words strong { color: var(--gold); }

    /* Status bar */
    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.6rem 1rem; background: rgba(8,26,94,0.97);
      border-top: 1px solid var(--border); color: rgba(255,255,255,0.85);
      font-size: 0.82rem; display: none; align-items: center;
      gap: 0.6rem; z-index: 200; backdrop-filter: blur(8px);
    }
    #status-bar.visible { display: flex; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
      animation: sdot 1.2s ease-in-out infinite;
    }
    @keyframes sdot { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(8,26,94,0.93);
      display: none; flex-direction: column; align-items: center;
      justify-content: center; z-index: 300; backdrop-filter: blur(8px);
    }
    #loading-overlay.visible { display: flex; }
    .spinner {
      width: 44px; height: 44px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 0.9rem; }

    /* Scrollbars */
    .word-list::-webkit-scrollbar { width: 3px; }
    .word-list::-webkit-scrollbar-track { background: transparent; }
    .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <a href="/" class="back-btn">←</a>
    <div class="header-title">
      <div class="book-name">{{ book.title }}</div>
      <div class="page-info" id="page-info">Loading…</div>
    </div>
    <div class="parrot-icon">🦜</div>
  </header>

  <!-- Main layout -->
  <div class="app-layout">

    <!-- Left: book page -->
    <div class="page-panel">
      <div class="page-nav">
        <button class="nav-btn" id="btn-prev" disabled>← Prev</button>
        <span class="page-counter" id="page-counter">Page 1</span>
        <button class="nav-btn" id="btn-next" disabled>Next →</button>
      </div>
      <div class="page-canvas" id="page-canvas">
        <div class="no-image">
          <span>📖</span>
          <p>Loading book…</p>
        </div>
      </div>
    </div>

    <!-- Right: words -->
    <div class="word-panel">
      <div class="word-panel-header">
        <h3 id="words-label">Words on this page</h3>
      </div>

      <div class="word-showcase">
        <div class="showcase-words">
          <div class="word-es" id="sel-es">—</div>
          <div class="word-divider">🇲🇽 español · english 🇺🇸</div>
          <div class="word-en" id="sel-en">—</div>
        </div>
        <button class="btn-play-big" id="btn-play-selected" title="Pronounce this word">🔊</button>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="btn-speak-all">▶ Play All Words</button>
        <button class="ctrl-btn stop" id="btn-stop">⏹ Stop</button>
      </div>

      <div class="teacher-note" id="teacher-note">
        <div class="teacher-note-label">👩‍🏫 Teacher Tip</div>
        <div class="teacher-note-text" id="teacher-note-text"></div>
      </div>

      <div class="word-list" id="word-list">
        <div class="empty-words"><p>Loading…</p></div>
      </div>
    </div>

  </div><!-- /.app-layout -->

  <div id="status-bar">
    <div class="status-dot"></div>
    <span id="status-text">Ready</span>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text" id="loading-text">Loading…</p>
  </div>

  <script>
    const BOOK_ID   = {{ book_id | tojson }};
    const NUM_PAGES = {{ book.num_pages | default(0) }};

    let state = {
      currentPage: 0,
      words: [],
      selectedIdx: null,
      playingAll: false,
      audioObj: null,
    };

    const $ = id => document.getElementById(id);

    function showStatus(msg) {
      $("status-bar").classList.add("visible");
      $("status-text").textContent = msg;
    }
    function hideStatus() { $("status-bar").classList.remove("visible"); }
    function showLoading(msg) {
      $("loading-text").textContent = msg || "Loading…";
      $("loading-overlay").classList.add("visible");
    }
    function hideLoading() { $("loading-overlay").classList.remove("visible"); }

    function esc(s) {
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── Page loading ──────────────────────────────────────────────

    async function loadPage(idx) {
      if (NUM_PAGES === 0) return;
      stopAll();
      state.currentPage = idx;
      state.selectedIdx = null;

      $("page-counter").textContent = `Page ${idx + 1} of ${NUM_PAGES}`;
      $("page-info").textContent     = `Page ${idx + 1} of ${NUM_PAGES}`;
      $("btn-prev").disabled = idx === 0;
      $("btn-next").disabled = idx === NUM_PAGES - 1;

      // Load page image
      const canvas = $("page-canvas");
      canvas.innerHTML = `
        <div class="no-image">
          <span>⏳</span><p>Loading page…</p>
        </div>`;
      const img = new Image();
      img.alt = `Page ${idx + 1}`;
      img.style.maxWidth = "100%";
      img.style.maxHeight = "100%";
      img.style.objectFit = "contain";
      img.style.borderRadius = "8px";
      img.style.boxShadow = "0 6px 30px rgba(0,0,0,0.4)";
      img.onload = () => {
        canvas.innerHTML = "";
        canvas.appendChild(img);
      };
      img.onerror = () => {
        canvas.innerHTML = `
          <div class="no-image">
            <span>📄</span>
            <p>No page image.<br>Words are still available below.</p>
          </div>`;
      };
      img.src = `/api/book/${BOOK_ID}/page/${idx}/image`;

      // Load word content
      try {
        const res  = await fetch(`/api/book/${BOOK_ID}/page/${idx}/content`);
        const data = await res.json();
        state.words = data.content || [];

        // Teacher note
        const tn = $("teacher-note");
        if (data.teacher_note) {
          $("teacher-note-text").textContent = data.teacher_note;
          tn.classList.add("visible");
        } else {
          tn.classList.remove("visible");
        }

        renderWordList();
        resetShowcase();
      } catch (e) {
        state.words = [];
        renderWordList();
      }
    }

    function renderWordList() {
      const list  = $("word-list");
      const count = state.words.length;
      $("words-label").textContent = count
        ? `${count} word${count !== 1 ? "s" : ""} on this page`
        : "Words on this page";

      if (!count) {
        list.innerHTML = `
          <div class="empty-words">
            <p>No words saved for this page yet.<br>
            <strong>More coming soon!</strong></p>
          </div>`;
        return;
      }

      list.innerHTML = state.words.map((w, i) => `
        <div class="word-item" data-idx="${i}" onclick="selectWord(${i})">
          <span class="wi-es">${esc(w.es)}</span>
          <span class="wi-sep">→</span>
          <span class="wi-en">${esc(w.en)}</span>
          <span class="wi-play">🔊</span>
        </div>`).join("");

      selectWord(0);
    }

    function selectWord(idx) {
      state.selectedIdx = idx;
      document.querySelectorAll(".word-item").forEach((el, i) =>
        el.classList.toggle("active", i === idx));
      const w = state.words[idx];
      if (w) {
        $("sel-es").textContent = w.es;
        $("sel-en").textContent = w.en;
      }
      const el = document.querySelector(`.word-item[data-idx="${idx}"]`);
      if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function resetShowcase() {
      $("sel-es").textContent = "—";
      $("sel-en").textContent = "—";
    }

    // ── Audio ─────────────────────────────────────────────────────

    async function speakPair(spanish, english) {
      showStatus(`🔊 ${spanish} · ${english}`);
      $("btn-play-big").classList.add("loading");
      try {
        const res = await fetch("/api/speak", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ spanish, english, lang: "both" })
        });
        if (!res.ok) {
          const e = await res.json();
          throw new Error(e.error || "Audio failed");
        }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        if (state.audioObj) { state.audioObj.pause(); state.audioObj = null; }
        state.audioObj = new Audio(url);
        state.audioObj.play();
        await new Promise(r => {
          state.audioObj.onended = r;
          state.audioObj.onerror = r;
        });
        URL.revokeObjectURL(url);
      } catch (err) {
        showStatus("❌ " + err.message);
        setTimeout(hideStatus, 3500);
        return;
      } finally {
        $("btn-play-big").classList.remove("loading");
      }
      hideStatus();
    }

    async function speakWord(idx) {
      const w = state.words[idx];
      if (!w) return;
      selectWord(idx);
      await speakPair(w.es, w.en);
    }

    function stopAll() {
      state.playingAll = false;
      if (state.audioObj) { state.audioObj.pause(); state.audioObj = null; }
      hideStatus();
      $("btn-play-big").classList.remove("loading");
    }

    // ── Button events ─────────────────────────────────────────────

    $("btn-prev").addEventListener("click", () => {
      if (state.currentPage > 0) loadPage(state.currentPage - 1);
    });
    $("btn-next").addEventListener("click", () => {
      if (state.currentPage < NUM_PAGES - 1) loadPage(state.currentPage + 1);
    });

    $("btn-play-selected").addEventListener("click", () => {
      const idx = state.selectedIdx;
      if (idx !== null && state.words[idx]) {
        speakWord(idx);
      }
    });

    $("btn-stop").addEventListener("click", stopAll);

    $("btn-speak-all").addEventListener("click", async () => {
      if (!state.words.length) return;
      state.playingAll = true;
      for (let i = 0; i < state.words.length; i++) {
        if (!state.playingAll) break;
        await speakWord(i);
        if (state.playingAll) await new Promise(r => setTimeout(r, 700));
      }
      state.playingAll = false;
    });

    // ── Swipe support (mobile) ────────────────────────────────────
    let touchStartX = 0;
    document.addEventListener("touchstart", e => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    document.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) < 60) return;
      if (dx < 0 && state.currentPage < NUM_PAGES - 1) loadPage(state.currentPage + 1);
      if (dx > 0 && state.currentPage > 0) loadPage(state.currentPage - 1);
    }, { passive: true });

    // ── Init ──────────────────────────────────────────────────────
    if (NUM_PAGES > 0) {
      loadPage(0);
    } else {
      $("page-canvas").innerHTML = `
        <div class="no-image">
          <span>📖</span>
          <p>This book is being set up.<br>Check back soon!</p>
        </div>`;
      $("page-info").textContent = "Coming soon";
      $("word-list").innerHTML = `
        <div class="empty-words">
          <p>Content coming soon!</p>
        </div>`;
    }
  </script>
</body>
</html>
