<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ book.title }} · Biliteracy Bridge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0B1F3A;color:#fff;min-height:100vh}
header{background:#0B1F3A;border-bottom:3px solid #F9C12E;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:8px}
.brand-logo{font-size:22px}
.brand-name{font-size:16px;font-weight:700;color:#F9C12E}
.header-right{display:flex;align-items:center;gap:10px}
.page-counter{font-size:13px;color:#8BA3C0;font-weight:500}
.back-link{font-size:13px;color:#4A6A8A;text-decoration:none}
.back-link:hover{color:#F9C12E}
.layout{display:grid;grid-template-columns:1fr 340px;gap:0;min-height:calc(100vh - 60px)}
@media(max-width:780px){.layout{grid-template-columns:1fr}}
.page-viewer{padding:20px;display:flex;flex-direction:column;align-items:center}
.page-img-wrap{width:100%;max-width:520px;background:#0F2847;border-radius:16px;border:1.5px solid #1E3A5F;overflow:hidden;margin-bottom:16px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center}
.page-img{width:100%;height:100%;object-fit:contain;display:block}
.page-nav{display:flex;align-items:center;gap:12px;margin-top:4px}
.nav-btn{background:#0F2847;border:1.5px solid #ddd;color:#666;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:#F9C12E;color:#F9C12E}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.page-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:200px}
.dot{width:7px;height:7px;border-radius:50%;background:#ddd;transition:background .2s}
.dot.active{background:#F9C12E}
.sidebar{background:#0F2847;border-left:1.5px solid #f0e0d8;padding:20px;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px}
@media(max-width:780px){.sidebar{border-left:none;border-top:1.5px solid #f0e0d8;position:static;max-height:none}}
.word-section{margin-bottom:20px}
.word-section h3{font-size:12px;font-weight:700;color:#4A6A8A;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.word-card{background:#0B1F3A;border-radius:12px;padding:14px;margin-bottom:10px}
.word-label{font-size:11px;color:#4A6A8A;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.word-text{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.word-pron{font-size:12px;color:#4A6A8A;font-style:italic;margin-bottom:10px}
.play-row{display:flex;gap:8px;flex-wrap:wrap}
.play-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.play-btn-en{background:rgba(30,58,95,.8);color:#90CAF9}
.play-btn-en:hover{background:#1565C0;color:#fff}
.play-btn-es{background:rgba(249,193,46,.15);color:#F9C12E}
.play-btn-es:hover{background:#F9C12E;color:#0B1F3A}
.play-btn-both{background:rgba(76,175,80,.15);color:#81C784}
.play-btn-both:hover{background:#2E7D32;color:#fff}
.play-btn:disabled{opacity:.5;cursor:not-allowed}
.no-word{font-size:13px;color:#ccc;font-style:italic;padding:8px 0}
.divider{border:none;border-top:1px solid #f0ede8;margin:16px 0}
/* Teaching tips */
.tips-toggle{width:100%;background:#0F2847;border:none;border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:14px;font-weight:600;color:#F9C12E;transition:background .15s;margin-bottom:2px}
.tips-toggle:hover{background:#FFE0B2}
.tips-toggle .arrow{transition:transform .25s;font-style:normal;font-size:12px}
.tips-toggle.open .arrow{transform:rotate(180deg)}
.tips-panel{display:none;background:#FFFDF9;border-radius:12px;border:1px solid #FFE0CC;overflow:hidden;margin-top:4px}
.tips-panel.open{display:block}
.tip-section{padding:14px 16px;border-bottom:1px solid #FFF0E0}
.tip-section:last-child{border-bottom:none}
.tip-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.tip-head-tip{color:#F9C12E}
.tip-head-act{color:#6A1B9A}
.tip-head-fact{color:#1565C0}
.tip-text{font-size:13px;color:#CBD5E0;line-height:1.55}
.act-box{background:rgba(249,193,46,.08);border-left:3px solid #FFC107;padding:8px 10px;border-radius:0 8px 8px 0;font-size:13px;color:#E0E0E0;line-height:1.5}
.fact-box{background:rgba(30,58,95,.8);border-left:3px solid #9C27B0;padding:8px 10px;border-radius:0 8px 8px 0;font-size:12px;color:#90CAF9;line-height:1.5}
.no-tip{font-size:12px;color:#ccc;font-style:italic;padding:14px 16px}
.sim-row{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#f9f9f9}
.sim-label{font-size:11px;color:#4A6A8A;min-width:55px}
.sim-track{flex:1;height:4px;background:#eee;border-radius:2px;overflow:hidden}
.sim-fill{height:100%;border-radius:2px}
.sim-high{background:#F9C12E}
.sim-med{background:#FFA726}
.sim-low{background:#42A5F5}
.sim-pct{font-size:11px;color:#4A6A8A;min-width:32px;text-align:right}
.cognate-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px}
.badge-perfect{background:#0F2847;color:#BF360C}
.badge-near{background:#E8F5E9;color:#1B5E20}
.badge-related{background:#E3F2FD;color:#0D47A1}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="/logo.png" alt="Biliteracy Bridge"
         style="height:44px;width:auto"
         onerror="this.style.display='none';document.getElementById('brand-text').style.display='flex'">
    <div id="brand-text" style="display:none;align-items:center;gap:8px">
      <span style="font-size:18px;font-weight:800;color:#F9C12E">Biliteracy Bridge</span>
    </div>
    <div class="brand-name">Biliteracy Bridge</div>
  </div>
  <div class="header-right">
    <span class="page-counter" id="pageCounter">Page 1 of {{ book.num_pages }}</span>
    <a href="/" class="back-link">← All Books</a>
  </div>
</header>

<div class="layout">
  <!-- LEFT: page image + navigation -->
  <div class="page-viewer">
    <div class="page-img-wrap">
      <img class="page-img" id="pageImg" src="/page-image/{{ book_id }}/0" alt="Book page">
    </div>
    <div class="page-nav">
      <button class="nav-btn" id="prevBtn" onclick="goPage(currentPage - 1)" disabled>← Prev</button>
      <div class="page-dots" id="pageDots"></div>
      <button class="nav-btn" id="nextBtn" onclick="goPage(currentPage + 1)">Next →</button>
    </div>
  </div>

  <!-- RIGHT: words + tips sidebar -->
  <div class="sidebar">
    <div class="word-section">
      <h3>Words on this page</h3>
      <div style="font-size:11px;color:#4A6A8A;line-height:1.4;margin-bottom:10px;padding:8px 10px;background:rgba(249,193,46,.08);border-radius:8px;border-left:3px solid #F9C12E">
        🔤 <strong style="color:#F9C12E">Dual-use phonics:</strong><br>
        English shown with Spanish phonetic conventions<br>
        Spanish shown with English phonetic conventions
      </div>

      <!-- English -->
      <div class="word-card">
        <div class="word-label">🇺🇸 English <span style="font-size:10px;color:#4A6A8A;font-weight:400">(for Spanish speakers)</span></div>
        <div class="word-text" id="enWord">—</div>
        <div class="word-pron" id="enPron"></div>
        <div class="play-row">
          <button class="play-btn play-btn-en" id="playEn" onclick="playWord('en')" disabled>▶ English</button>
          <button class="play-btn play-btn-both" id="playBoth" onclick="playBoth()" disabled>▶ Both</button>
        </div>
      </div>

      <!-- Spanish -->
      <div class="word-card">
        <div class="word-label">🇲🇽 Español <span style="font-size:10px;color:#4A6A8A;font-weight:400">(for English speakers)</span></div>
        <div class="word-text" id="esWord">—</div>
        <div class="word-pron" id="esPron"></div>
        <div class="play-row">
          <button class="play-btn play-btn-es" id="playEs" onclick="playWord('es')" disabled>▶ Español</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- Teaching Tips toggle -->
    <button class="tips-toggle" id="tipsToggle" onclick="toggleTips()">
      <span>💡 Teaching Tips & Activities</span>
      <span class="arrow">▼</span>
    </button>
    <div class="tips-panel" id="tipsPanel">
      <div id="tipsContent"></div>
    </div>
  </div>
</div>

<script>
// ── Page data — loaded via API to avoid template encoding issues ──────────────
const BOOK_ID = "{{ book_id }}";
const NUM_PAGES = {{ book.num_pages }};
let PAGES = [];
let DATA_LOADED = false;

async function loadPageData() {
  try {
    const r = await fetch(`/api/book/${BOOK_ID}/pages`);
    const d = await r.json();
    PAGES = d.pages || [];
    DATA_LOADED = true;
    // Re-render current page now that data is loaded
    updateWords();
    updateTips(
      (PAGES[currentPage]?.english || "").toLowerCase().split(/[\s\/]/)[0],
      PAGES[currentPage]?.english || "",
      PAGES[currentPage]?.spanish || "",
      PAGES[currentPage]?.custom_tip || ""
    );
  } catch(e) {
    console.error("Failed to load page data:", e);
  }
}

let currentPage = 0;
let playing = false;

// ── Teaching tips data ───────────────────────────────────────────────────────
const TIPS = {
"armadillo":{"sim":95,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"The double L in Spanish makes a 'y' sound: ar-ma-DEE-yo. Tell your child 'armadillo' means 'little armored one' in Spanish — tap fingers along your arm like armor plates!","act":"Tap fingertips across your arm like armadillo scales while saying both words slowly together.","fact":"'Armadillo' is pure Spanish — English borrowed it unchanged. It comes from 'armado' meaning armored."},
"buffalo":{"sim":88,"badge":"Near cognate","badgeClass":"badge-near","tip":"Nearly identical! Count syllables together: Buf-fa-lo (3) / Bú-fa-lo (3). The accent mark over ú tells you exactly where to stress — your built-in pronunciation guide.","act":"Stomp 3 times for each syllable: BUF — fa — lo / BOO — fa — lo. Hear the BUF vs BOO difference!","fact":"From Greek 'boubalos.' The accent mark in Spanish is doing the job that word-stress does automatically in English."},
"baboon":{"sim":72,"badge":"Near cognate","badgeClass":"badge-near","tip":"Listen for the shared 'ba' at the start! English ends with 'boon,' Spanish adds 'wee-no': ba-bwee-NO. Can your child hear the 'ba' hiding in both words?","act":"Make a funny baboon chatter sound between syllables — ba-BOON! ba-bwee-NO!","fact":"Both come from the French 'babouin.' Spanish transformed the ending with the common '-ino' suffix found in many animal names."},
"crocodile":{"sim":78,"badge":"Near cognate","badgeClass":"badge-near","tip":"Point out the shared letters C-R-O-C / C-O-C-O — they got rearranged! Clap syllables: Croc-o-dile / Co-co-dri-lo. Both have 4 syllables. Same animal, letters just shuffled.","act":"Snap hands like crocodile jaws for each syllable: Co — co — dri — lo!","fact":"From Greek 'krokodilos' meaning 'pebble worm.' Both languages borrowed the same Greek word on slightly different journeys."},
"camel":{"sim":80,"badge":"Near cognate","badgeClass":"badge-near","tip":"Spot the double L in 'camello' — it sounds like 'y': ka-MEY-yo! How many humps on a camel? 1 or 2? Count the Ls in camello: 2! A great memory hook for the double-L rule.","act":"Sway like a camel while saying ka-MEY-yo. The double-L gives the word a beautiful rolling sound.","fact":"The double-L (ll) producing a 'y' sound is one of Spanish's most iconic features — you'll see it in ella, llamar, silla, and hundreds more words."},
"dinosaur":{"sim":85,"badge":"Near cognate","badgeClass":"badge-near","tip":"Spanish adds 'io' at the end! Cover the 'io' in dinosaurio with your finger — the English word is hiding inside. This -o/-io ending swap is one of the most useful patterns to teach.","act":"Cover the 'io' at the end of dinosaurio — what do you see? Di-no-saur! The English word is hiding inside!","fact":"From Greek 'deinos' (terrible) + 'sauros' (lizard). Both languages borrowed from the same scientific Greek when fossils were discovered in the 1800s."},
"dolphin":{"sim":70,"badge":"Near cognate","badgeClass":"badge-near","tip":"The accent mark over í tells you to say 'FEEN' — long, clear vowel! English: DOL-fin; Spanish: del-FEEN. Great moment to practice the long 'ee' sound the accent mark signals.","act":"Make dolphin clicking sounds! Then say del-FEEN — stretch that FEEN sound like a dolphin's call.","fact":"The accent mark in Spanish isn't decoration — it's a pronunciation instruction. Spanish is always telling you exactly how to say it!"},
"elephant":{"sim":85,"badge":"Near cognate","badgeClass":"badge-near","tip":"Both start with 'ele' — point that out! The 'ph' in English makes an 'f' sound, and Spanish spells it with a plain F. Same sound, more logical spelling! Count syllables: English 3, Spanish 4.","act":"Swing your arm like an elephant's trunk while saying each word slowly. Trunk swings on the stressed syllable!","fact":"Spanish consistently uses F where English uses PH (from Greek). You'll see this in pharmacy/farmacia, phone/fono, photo/foto."},
"flamingo":{"sim":75,"badge":"Near cognate","badgeClass":"badge-near","tip":"Cultural treasure: in Spanish 'flamenco' means BOTH the bird AND the famous dance! The dance was named after the bird's graceful elegance. Modern Spanish also uses 'flamingo' for the bird.","act":"Do a little flamenco dance pose — arms out, head tilted — while saying fla-MEN-ko. You're a flamingo!","fact":"The dance 'flamenco' shares its name with the bird — an extraordinary double meaning hiding in a coloring page."},
"giraffe":{"sim":72,"badge":"Near cognate","badgeClass":"badge-near","tip":"IMPORTANT RULE: Spanish J sounds like English H! So 'Jirafa' = hee-RAH-fah, not ji-RAH-fah. Once your child knows J=H, they can read dozens of Spanish words with new confidence.","act":"Reach arms way up high like a giraffe neck while saying hee-RAH-fah. The tall second syllable gets the stress!","fact":"J=H applies to: jugo, jardín, joven, julio, jefe — and hundreds more. Teach this rule early — it's one of the biggest unlocks for young Spanish readers."},
"gorilla":{"sim":90,"badge":"Near cognate","badgeClass":"badge-near","tip":"English has double L; Spanish has single L — but they sound almost the same! Great for showing spelling differences don't always change pronunciation. These words are clearly siblings.","act":"Beat your chest gently like a gorilla — one thump per syllable: go-RIL-la / go-REE-la. Same rhythm!","fact":"English doubled the L while Spanish kept one. The meaning and sound are the same — only the spelling memory trick differs."},
"hippopotamus":{"sim":82,"badge":"Near cognate","badgeClass":"badge-near","tip":"Both are 5 syllables — count them on fingers! Hip-po-pot-a-mus / Hi-po-pó-ta-mo. Same rhythm, same number of beats. Great for showing long cognates keep their structure across languages.","act":"Stomp 5 heavy hippo stomps — one per syllable. English and Spanish have exactly the same number!","fact":"From Greek 'hippos' (horse) + 'potamos' (river) = 'river horse.' Both languages preserved all five syllables faithfully over 2,000 years."},
"iguana":{"sim":98,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"PERFECT COGNATE! Barely any difference. English: ih-GWAH-na; Spanish: ee-GWAH-nah. This is one of those magical words that needs zero translation. Only the starting vowel length differs slightly.","act":"Say it slowly in English, then Spanish. Challenge: can anyone hear the difference? It's so tiny!","fact":"From Arawak 'iwana' (a Caribbean indigenous language). Both borrowed it so similarly that it stayed almost identical — a rare and wonderful treat."},
"insect":{"sim":88,"badge":"Near cognate","badgeClass":"badge-near","tip":"Spanish adds 'o': in-sect + o = insecto! Many English words ending in a consonant become Spanish words ending in '-o.' Ask your child: what other words might follow this pattern?","act":"Count 6 legs on the grasshopper — insects always have 6! In-sec-to has 3 syllables. 3 pairs of legs, 3 syllables!","fact":"From Latin 'insectum' (notched). The '-o' ending is Spanish keeping the original Latin vowel that English dropped over centuries."},
"jaguar":{"sim":95,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"PERFECT COGNATE — same spelling! English J sounds hard; Spanish J = H, so: hah-GWAR. This word came from a South American indigenous language (Tupi-Guaraní) and both languages borrowed it.","act":"Draw jaguar spots while saying both versions: JAG-war / hah-GWAR. Spot the J=H rule in action!","fact":"From Tupi-Guaraní 'yaguareté' meaning 'the true beast.' Both languages borrowed it from the indigenous peoples of South America."},
"koala":{"sim":100,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"PERFECT COGNATE! Absolutely identical in both languages. From the Dharug Aboriginal language of Australia. When both languages borrow from the same third language, they often end up identical.","act":"Hug a stuffed animal tight like a koala hugs its tree while saying the word — identical in both languages!","fact":"From Dharug 'gula.' Both English and Spanish borrowed directly from Australian Aboriginal language around the same time — arriving at the exact same word."},
"lion":{"sim":78,"badge":"Near cognate","badgeClass":"badge-near","tip":"The accent mark (ó) tells you to stress the LAST syllable: le-ON. English stresses the first: LYE-un. Same animal, very different musical rhythm. A great lesson in how accent marks change the feel of a word.","act":"ROAR after each version! LYE-un — ROAR! le-ON — ROAR! Which roar feels more royal?","fact":"Without the accent mark, 'leon' could be a person's name. The mark turns it into the king of the jungle — one small mark, big difference."},
"monkey":{"sim":20,"badge":"Different words","badgeClass":"badge-related","tip":"DIFFERENT WORDS — an important lesson! 'Mono' is used across most of Latin America; 'Mico' is common in Colombia and other regions. Not every animal is a cognate, and that's just as valuable to know.","act":"Make a monkey sound to remember this special word: EE-EE, it's a MONO! This one needs to be memorized.","fact":"Regional variation in Spanish (mico vs mono) opens a conversation: Spanish is spoken by 500 million people across 20+ countries — it's not all the same!"},
"ocelot":{"sim":90,"badge":"Near cognate","badgeClass":"badge-near","tip":"Spanish adds 'e': ocelot → ocelote. Say them back-to-back: O-se-lot / o-se-LO-te. The added 'e' shifts stress to the third syllable. Very common near-cognate pattern.","act":"Trace the ocelot's beautiful spotted pattern while saying o-se-LO-te slowly.","fact":"From Nahuatl 'ōcēlōtl' (Aztec). Spanish kept an extra vowel — actually closer to the original Nahuatl form than English is."},
"panther":{"sim":83,"badge":"Near cognate","badgeClass":"badge-near","tip":"English 'th' becomes 't' in Spanish — very common! PAN-ther → pan-TE-ra. Count syllables: English 2, Spanish 3. Spanish added a syllable and shifted the stress.","act":"Prowl softly around the room while whispering both words. Panthers — and their names — have quiet grace.","fact":"From Greek 'panthēr.' Spanish replaced Greek 'th' with 't': theater/teatro, theme/tema, theory/teoría. One rule, hundreds of cognates!"},
"penguin":{"sim":78,"badge":"Near cognate","badgeClass":"badge-near","tip":"The ü (u with two dots, called diéresis) tells you to pronounce the U: pin-GWEE-no. Without those dots, 'gu' before 'i' would be silent. The dots are doing critical grammatical work!","act":"Waddle like a penguin between both words — pen-GWIN, pin-GWEE-no — both words have a waddle in their rhythm!","fact":"The ü is one of the only diacritical marks in Spanish that changes pronunciation rather than just stress. Point it out proudly!"},
"rhinoceros":{"sim":78,"badge":"Near cognate","badgeClass":"badge-near","tip":"English uses 'rh' at the start; Spanish uses plain 'r' — Spanish never uses 'rh.' Both clearly come from the same Greek word about horns.","act":"Point to the horn while saying both words — the horn is the same; the names nearly are too!","fact":"From Greek 'rhinokerōs' = rhinos (nose) + keras (horn). Different Latin endings survived in each language from the same root."},
"salamander":{"sim":92,"badge":"Near cognate","badgeClass":"badge-near","tip":"Almost perfect! English ends in '-er'; Spanish ends in '-ra': sala-MAN-der / sala-MAN-dra. Just the last two letters swapped order. Both have 4 syllables with stress in the same place!","act":"Count the salamander's 4 legs, then count the 4 syllables in sala-man-dra! A perfectly satisfying match.","fact":"The -er/-ra ending swap is a classic indicator of shared Latin origin — the root is identical, only the ending form differs."},
"tiger":{"sim":87,"badge":"Near cognate","badgeClass":"badge-near","tip":"Consonants T-G-R stay in both words. In Spanish every letter is pronounced — that final 'e' in tigre is always spoken. No silent letters in Spanish!","act":"Let out a soft growl between syllables: Tee — GRRR — eh! The growl lives in the middle of the Spanish word!","fact":"In Spanish, no letter is ever silent — the final 'e' in tigre is spoken clearly. This consistency is one of Spanish's greatest strengths for young readers learning phonics."},
"tortoise":{"sim":45,"badge":"Related words","badgeClass":"badge-related","tip":"Not strong cognates — different paths from Latin. But 'Tortuga' is the famous pirate island name! A great cultural conversation. Point out the shared 'tor' sound at the beginning.","act":"Move veeery slowly like a tortoise between the words. Tor-toise… tor-TOO-gah… slow and steady.","fact":"The pirate island 'Tortuga' off Haiti shows how Spanish explorer names shaped Caribbean geography. History is hiding in this word!"},
"uakari":{"sim":92,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"PERFECT COGNATE from a Brazilian indigenous language! Both pronounced nearly identically. The accent in Spanish shifts stress to the last syllable. Celebrates indigenous linguistic heritage!","act":"This is a rare and special word — celebrate discovering it together! Say it 3 times: Uakari, Uacarí, Uakari!","fact":"From Tupi or another Amazonian language. Many South American animals have names borrowed from indigenous languages into both Spanish and English."},
"viper":{"sim":60,"badge":"Related words","badgeClass":"badge-related","tip":"Both trace to Latin 'vipera.' Spanish 'v' is very soft — almost like a 'b' sound: VEE-bo-rah. Latin 'vipera' is actually closer to Spanish 'víbora' — Spanish preserved more of the original!","act":"Make a long ssssss sound between the words like a viper. VYE-per… ssss… VEE-bo-rah!","fact":"From Latin 'vipera' = vivus (alive) + parere (give birth) — vipers bear live young! Spanish kept 3 of the original Latin syllables; English compressed to 2."},
"yak":{"sim":100,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"PERFECT COGNATE! Identical spelling and pronunciation in both languages. Borrowed from Tibetan unchanged. Say it once — you've said it in both languages!","act":"Make a low, gruff YAK grunt — exactly the same in English and Spanish. One sound, two languages!","fact":"From Tibetan 'g.yag.' Short words from distant languages often stay identical because there's no pressure to modify them."},
"cactus":{"sim":97,"badge":"★ Perfect cognate","badgeClass":"badge-perfect","tip":"PERFECT COGNATE! Same spelling, nearly same pronunciation. English: KAK-tus; Spanish: KAHK-toos. The final S is pronounced more clearly in Spanish. A great confidence builder!","act":"Count the cactus spines on the page. Prickly in English AND Spanish — some things need no translation!","fact":"From Greek 'kaktos.' Scientific names from Latin/Greek often become perfect cognates because both languages borrowed from the same academic source."},
"canyon":{"sim":82,"badge":"Near cognate","badgeClass":"badge-near","tip":"English borrowed 'canyon' FROM Spanish 'cañón'! The ñ (eñe) makes the 'ny' sound. Spanish explorers named canyons across the American West, and English kept their word.","act":"Cup hands around your mouth and call into the canyon: ka-NYOHN! Does the echo come back in Spanish?","fact":"Words like canyon, bronco, ranch, rodeo, lasso all entered English from Spanish in the 1800s as settlers encountered Spanish-named landscapes."},
"island":{"sim":65,"badge":"Related words","badgeClass":"badge-related","tip":"Both come from Latin 'insula.' Fascinating: English 'island' has a SILENT S — added in the 1500s to look more Latin! Spanish 'isla' is actually more phonetic and closer to the original Latin.","act":"Draw a tiny island circle on paper — la ISLA, the island. Same concept, different journeys to get here.","fact":"The S in English 'island' is entirely silent and was added by scribes wanting the word to look Latin. Spanish 'isla' simply kept Latin directly — often easier to spell!"},

// ── Navigation ───────────────────────────────────────────────────────────────

function buildDots() {
  const wrap = document.getElementById("pageDots");
  wrap.innerHTML = "";
  const total = Math.min(NUM_PAGES, 20);
  for (let i = 0; i < total; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.onclick = (function(idx){ return () => goPage(idx); })(i);
    d.title = "Page " + (i + 1);
    wrap.appendChild(d);
  }
}

function goPage(idx) {
  if (idx < 0 || idx >= NUM_PAGES) return;
  currentPage = idx;
  document.getElementById("pageImg").src = `/page-image/${BOOK_ID}/${idx}`;
  document.getElementById("pageCounter").textContent = `Page ${idx + 1} of ${NUM_PAGES}`;
  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === NUM_PAGES - 1;
  document.querySelectorAll(".dot").forEach((d, i) => d.classList.toggle("active", i === idx));
  updateWords();
}

function updateWords() {
  const page = PAGES[currentPage] || {};

  // Build word list — try every possible data location
  let wordList = [];

  // Option 1: words array with real content
  if (page.words && page.words.length) {
    const real = page.words.filter(w => w.english || w.spanish);
    if (real.length) wordList = real;
  }

  // Option 2: legacy top-level english/spanish fields
  if (!wordList.length && (page.english || page.spanish)) {
    wordList = [{
      english:     page.english || "",
      spanish:     page.spanish || "",
      en_sentence: page.en_sentence || "",
      es_sentence: page.es_sentence || ""
    }];
  }

  const container = document.getElementById("wordsContainer");
  if (!container) return;

  if (!wordList.length) {
    container.innerHTML = '<p class="no-word">No words on this page</p>';
    updateTips("", "", "", "");
    return;
  }

  container.innerHTML = wordList.map((w, i) => {
    const key  = (w.english || "").toLowerCase().split(/[\s\/]/)[0];
    const pron = PRON[key] || {};
    const multi = wordList.length > 1;
    return `
      ${multi ? `<div class="word-num-badge">Word ${i+1}</div>` : ""}
      <div class="word-card">
        <div class="word-label">🇺🇸 English <span style="font-size:10px;color:#4A6A8A;font-weight:400">(for Spanish speakers)</span></div>
        <div class="word-text">${w.english || "—"}</div>
        ${pron.enP ? `<div class="word-pron">${pron.enP}</div>` : ""}
        ${w.en_sentence ? `<div class="sentence-text">"${w.en_sentence}"</div>` : ""}
        <div class="play-row">
          <button class="play-btn play-btn-en" onclick="playAudio('en','word',${i})" ${w.english?"":"disabled"}>▶ Word</button>
          ${w.en_sentence ? `<button class="play-btn play-btn-en" style="opacity:.8" onclick="playAudio('en','sentence',${i})" >▶ Sentence</button>` : ""}
          <button class="play-btn play-btn-both" onclick="playBothWords(${i})" ${(w.english&&w.spanish)?"":"disabled"}>▶ Both</button>
        </div>
      </div>
      <div class="word-card" style="margin-top:10px">
        <div class="word-label">🇲🇽 Español <span style="font-size:10px;color:#4A6A8A;font-weight:400">(for English speakers)</span></div>
        <div class="word-text" style="color:#F9C12E">${w.spanish || "—"}</div>
        ${pron.esP ? `<div class="word-pron">${pron.esP}</div>` : ""}
        ${w.es_sentence ? `<div class="sentence-text">"${w.es_sentence}"</div>` : ""}
        <div class="play-row">
          <button class="play-btn play-btn-es" onclick="playAudio('es','word',${i})" ${w.spanish?"":"disabled"}>▶ Palabra</button>
          ${w.es_sentence ? `<button class="play-btn play-btn-es" style="opacity:.8" onclick="playAudio('es','sentence',${i})">▶ Oración</button>` : ""}
        </div>
      </div>
      ${multi && i < wordList.length-1 ? '<hr class="word-divider">' : ""}`;
  }).join("");

  // Tips use first word
  const first = wordList[0];
  const key = (first.english || "").toLowerCase().split(/[\s\/]/)[0];
  updateTips(key, first.english, first.spanish, page.custom_tip || "");
}

// ── Tips ─────────────────────────────────────────────────────────────────────

let tipsOpen = false;

function toggleTips() {
  tipsOpen = !tipsOpen;
  document.getElementById("tipsPanel").classList.toggle("open", tipsOpen);
  document.getElementById("tipsToggle").classList.toggle("open", tipsOpen);
}

function updateTips(key, enW, esW, customTip) {
  const baseTip = TIPS[key];
  const el = document.getElementById("tipsContent");
  if (!enW) { el.innerHTML = `<p class="no-tip">No teaching tip for this page.</p>`; return; }
  const t = baseTip ? {...baseTip} : {sim:80, badge:"Custom tip", badgeClass:"badge-near", act:"", fact:""};
  if (customTip) t.tip = customTip;
  if (!t.tip) { el.innerHTML = `<p class="no-tip">No teaching tip for this page. Tips are available for all cognate pages.</p>`; return; }
  const simClass = t.sim >= 95 ? "sim-high" : t.sim >= 80 ? "sim-med" : "sim-low";
  el.innerHTML = `
    <div class="sim-row">
      <span class="sim-label">Similarity</span>
      <div class="sim-track"><div class="${simClass} sim-fill" style="width:${t.sim}%"></div></div>
      <span class="sim-pct">${t.sim}%</span>
    </div>
    <div style="padding:10px 16px 0">
      <span class="cognate-badge ${t.badgeClass}">${customTip ? "✏️ Custom tip" : t.badge}</span>
    </div>
    <div class="tip-section">
      <div class="tip-head tip-head-tip">💡 Parent & teacher tip</div>
      <div class="tip-text">${t.tip}</div>
    </div>
    ${t.act ? `<div class="tip-section"><div class="tip-head tip-head-act">🎯 Activity</div><div class="act-box">${t.act}</div></div>` : ""}
    ${t.fact ? `<div class="tip-section"><div class="tip-head tip-head-fact">🌍 Linguistic fun fact</div><div class="fact-box">${t.fact}</div></div>` : ""}`;
}

// ── Audio ─────────────────────────────────────────────────────────────────────

function playAudio(lang, type, wordIdx) {
  if (playing) return;
  playing = true;
  const url = `/speak/${BOOK_ID}/${currentPage}/${lang}?type=${type}&word_idx=${wordIdx}`;
  const audio = new Audio(url);
  audio.onended = () => { playing = false; };
  audio.onerror = () => { playing = false; };
  audio.play().catch(() => { playing = false; });
}

async function playBothWords(wordIdx) {
  if (playing) return;
  playing = true;
  await playLang("en", wordIdx);
  await new Promise(r => setTimeout(r, 700));
  await playLang("es", wordIdx);
  playing = false;
}

function playLang(lang, wordIdx=0) {
  return new Promise(resolve => {
    const audio = new Audio(`/speak/${BOOK_ID}/${currentPage}/${lang}?type=word&word_idx=${wordIdx}`);
    audio.onended = resolve;
    audio.onerror = resolve;
    audio.play().catch(resolve);
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildDots();
loadPageData();  // fetch word data from API

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") goPage(currentPage + 1);
  if (e.key === "ArrowLeft") goPage(currentPage - 1);
});
</script>
